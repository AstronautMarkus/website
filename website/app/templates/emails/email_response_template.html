<!doctype html>
<html>

<head>
	<meta charset="UTF-8">
	<title>{{ title }}</title>
	<style>
		body {
			margin: 0;
			padding: 24px 12px;
			background-color: #000014;
			font-family: Verdana, Tahoma, "Courier New", monospace;
			color: #e7e7ff;
		}

		.container {
			border: 2px solid #8f8fa8;
			border-top-color: #dedee8;
			border-left-color: #dedee8;
			border-right-color: #595968;
			border-bottom-color: #595968;
			padding: 20px;
			margin: 0 auto;
			width: 100%;
			max-width: 650px;
			background: #202038;
			box-shadow: inset 1px 1px 0 #ffffff33, inset -1px -1px 0 #00000066;
			box-sizing: border-box;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 24px;
			color: #00ffff;
			letter-spacing: 1px;
			text-transform: uppercase;
			text-shadow: 1px 1px 0 #ff00ff;
			text-align: center;
		}

		p {
			margin: 0;
			line-height: 1.6;
			font-size: 14px;
			color: #e7e7ff;
			text-align: center;
		}

		footer {
			margin-top: 24px;
			text-align: center;
			font-size: 12px;
			color: #8f8fa8;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>{{ title }}</h1>
		<p>{{ description }}</p>
	</div>
	<footer>
		<p>{{ year }} - Marcos Reyes / AstronautMarkusDev</p>
	</footer>
</body>

</html>
